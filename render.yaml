services:
  - type: web
    name: adtrust-ai
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MODEL_PROVIDER
        value: deepseek
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_REASONING_MODEL
        value: deepseek-v4-pro
      - key: DEEPSEEK_API_KEY
        sync: false
